name: Publish Windows executable

on:
  workflow_dispatch:
  push:
    paths:
      - "NetworkMonitor/**"
      - "NetworkMonitor.sln"
      - ".github/workflows/publish-windows-exe.yml"
  pull_request:
    paths:
      - "NetworkMonitor/**"
      - "NetworkMonitor.sln"
      - ".github/workflows/publish-windows-exe.yml"

permissions:
  contents: read

concurrency:
  group: publish-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained single-file exe
        run: dotnet publish ./NetworkMonitor/NetworkMonitor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./artifacts/publish

      - uses: actions/upload-artifact@v4
        with:
          name: netm-win-x64
          path: artifacts/publish/netm.exe
