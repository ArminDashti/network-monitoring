# Netvan Configuration

# Database path (default: %LocalAppData%\Netvan\traffic.db)
database_path = "%NETVAN_HOME%\\traffic.db"

# Monitoring settings
[monitoring]
# Exclude traffic over VPN network adapters
disable_vpn_tracking = false

# Storage settings
[storage]
# Maximum database size in MB
max_size_mb = 500
# Retention period in days
retention_days = 30

# Logging settings
[logging]
# Log level: Debug, Info, Warning, Error
level = "Info"
# Log file path
log_file = "%NETVAN_HOME%\\netvan.log"

# Taskbar widget
[taskbar]
# Show upload/download speeds in the Windows taskbar
enabled = false
